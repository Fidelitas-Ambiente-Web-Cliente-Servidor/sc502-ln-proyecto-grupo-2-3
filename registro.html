<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restaurante To'kustar</title>
    
    <!-- Bootstrap -->
    <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
    rel="stylesheet">

    <!-- Google Fonts -->
    <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Lato:wght@300;400;700&display=swap"
    rel="stylesheet">

    <!-- Tu CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="container mt-4">
  
    <h1 class="text-center mb-2">
        Restaurante To'kustar
    </h1>

    <p class="eslogan">
        Para Apetitos Muy Grandes
    </p>



    <div class="titulo-menu">
    <h2>Menú</h2>

    <img
    src="https://images-wixmp-ed30a86b8c4ca887773594c2.wixmp.com/f/cb6c3856-3acb-458e-9874-a79469ba3c55/d7rj1m6-049ff778-3344-46fb-9fb5-43c1a3d79251.png/v1/fill/w_1024,h_1121/way_big_omnitrix_icon_by_zeluiz08_d7rj1m6-fullview.png?token=eyJ0eXAiOiJKV1QiLCJhbGciOiJIUzI1NiJ9.eyJzdWIiOiJ1cm46YXBwOjdlMGQxODg5ODIyNjQzNzNhNWYwZDQxNWVhMGQyNmUwIiwiaXNzIjoidXJuOmFwcDo3ZTBkMTg4OTgyMjY0MzczYTVmMGQ0MTVlYTBkMjZlMCIsIm9iaiI6W1t7ImhlaWdodCI6Ijw9MTEyMSIsInBhdGgiOiIvZi9jYjZjMzg1Ni0zYWNiLTQ1OGUtOTg3NC1hNzk0NjliYTNjNTUvZDdyajFtNi0wNDlmZjc3OC0zMzQ0LTQ2ZmItOWZiNS00M2MxYTNkNzkyNTEucG5nIiwid2lkdGgiOiI8PTEwMjQifV1dLCJhdWQiOlsidXJuOnNlcnZpY2U6aW1hZ2Uub3BlcmF0aW9ucyJdfQ.O2JdPFaKBxEh4RZYBb5W4bNpOvdR7d9DfnGLruvVNkQ"
    alt="Logo Muy Grande"
    class="logo-menu">
</div>

    <div class="mb-3">
        <button class="btn btn-dark"
        onclick="filtrarCategoria('Todos')">Todos</button>

        <button class="btn btn-outline-dark"
        onclick="filtrarCategoria('Entrada')">Entradas</button>

        <button class="btn btn-outline-dark"
        onclick="filtrarCategoria('Plato Fuerte')">Platos Fuertes</button>

        <button class="btn btn-outline-dark"
        onclick="filtrarCategoria('Postre')">Postres</button>
    </div>

    <div id="contenedor-menu" class="row"></div>

    <hr>

    <h2>Reservas</h2>

    <form id="form-reserva">

        <div class="mb-3">
            <label>Nombre completo</label>
            <input id="nombre" class="form-control">
            <div id="errorNombre"></div>
        </div>

        <div class="mb-3">
            <label>Correo</label>
            <input id="correo" class="form-control">
            <div id="errorCorreo"></div>
        </div>

        <div class="mb-3">
            <label>Fecha</label>
            <input type="date" id="fecha" class="form-control">
            <div id="errorFecha"></div>
        </div>

        <div class="mb-3">
            <label>Hora</label>

            <select id="hora" class="form-select">
                <option>12:00</option>
                <option>13:00</option>
                <option>18:00</option>
                <option>19:00</option>
                <option>20:00</option>
            </select>

        </div>

        <div class="mb-3">
            <label>Número de personas</label>
            <input type="number" id="personas" class="form-control">
            <div id="errorPersonas"></div>
        </div>

        <div class="mb-3">
            <label>Comentarios</label>
            <textarea id="comentarios" class="form-control"></textarea>
        </div>

        <button id="btnEnviar" class="btn btn-primary" disabled>
            Reservar
        </button>

    </form>

    <hr>

    <table class="table">

        <thead>
            <tr>
                <th>Nombre</th>
                <th>Correo</th>
                <th>Fecha</th>
                <th>Hora</th>
                <th>Personas</th>
            </tr>
        </thead>

        <tbody id="tablaReservas">

        </tbody>

    </table>

    <div id="resumen" class="resumen-reservas"></div>

</div>

<script src="js/app.js"></script>

</body>
</html>
